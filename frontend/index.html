<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KoreChat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; width: 100%; overflow: hidden; }
    /* Safari mobile 100vh fix — excludes browser chrome from height */
    @supports (-webkit-touch-callout: none) {
      html, body, #root { height: -webkit-fill-available; }
    }
    body { background: #080f1e; color: #c8d8f0; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #ffffff18; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #ffffff30; }
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700;800&display=swap');
    #splash {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 12px;
      background: #080f1e;
      font-family: 'JetBrains Mono', monospace;
      color: #7eb8f7; font-size: 13px; z-index: 9999; transition: opacity 0.3s;
    }
    #splash .logo {
      width: 40px; height: 40px; border-radius: 12px;
      background: linear-gradient(135deg, #7eb8f7, #7ef7d0);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 900; color: #0a1628;
    }
    #splash .dots span { animation: blink 1.2s infinite; opacity: 0; }
    #splash .dots span:nth-child(2) { animation-delay: 0.2s; }
    #splash .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100% { opacity:0 } 40% { opacity:1 } }
    #errmsg { padding:20px; max-width:900px; font-family:monospace; font-size:11px;
      color:#f7a07e; white-space:pre-wrap; word-break:break-all; }
    #errtitle { font-size:15px; font-weight:700; margin-bottom:12px; color:#f7d07e; }
    /* ── Mobile responsive ───────────────────────────────────────────────── */
    @media (max-width: 640px) {
      .kc-sidebar {
        position: fixed !important;
        left: -240px !important;
        top: 0 !important;
        height: 100vh !important;
        z-index: 210 !important;
        transition: left 0.22s cubic-bezier(0.4,0,0.2,1) !important;
        box-shadow: none !important;
      }
      .kc-sidebar-open {
        left: 0 !important;
        box-shadow: 4px 0 24px #00000060 !important;
      }
      .kc-mobile-overlay { display: block !important; }
      .kc-mobile-only { display: flex !important; }
      .kc-members-panel { display: none !important; }
    }
    @media (min-width: 641px) {
      .kc-mobile-overlay { display: none !important; pointer-events: none !important; }
      .kc-mobile-only { display: none !important; }
    }
  </style>

  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#080f1e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="KoreChat" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
</head>
<body>
  <div id="splash">
    <div class="logo">K</div>
    <span>KoreChat loading<span class="dots"><span>.</span><span>.</span><span>.</span></span></span>
  </div>
  <div id="root"></div>

  <script>
    function showErr(msg) {
      // Works even after splash is removed - uses a persistent overlay
      var el = document.getElementById('kc-error');
      if (!el) {
        el = document.createElement('div');
        el.id = 'kc-error';
        el.style.cssText = 'position:fixed;inset:0;background:#080f1e;z-index:99999;display:flex;align-items:center;justify-content:center;padding:20px;';
        document.body.appendChild(el);
      }
      el.innerHTML = '<div style="max-width:900px;font-family:monospace;font-size:11px;color:#f7a07e;white-space:pre-wrap;word-break:break-all"><div style="font-size:15px;font-weight:700;margin-bottom:12px;color:#f7d07e">\u26a0 KoreChat Error</div>' + msg + '</div>';
      var s = document.getElementById('splash');
      if (s) s.style.display = 'none';
    }
    window.onerror = function(msg, src, line, col, err) {
      showErr((err ? String(err) + '\n' + (err.stack||'') : msg) + '\nFile: ' + src + ' Line: ' + line);
      return true;
    };
    window.onunhandledrejection = function(e) {
      showErr('Unhandled rejection: ' + String(e.reason));
    };
  </script>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"
    onerror="showErr('Failed to load React from unpkg.com — CDN may be unreachable from this server.')"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"
    onerror="showErr('Failed to load ReactDOM from unpkg.com')"></script>
  <script src="https://unpkg.com/@babel/standalone@7.24.0/babel.min.js"
    onerror="showErr('Failed to load Babel from unpkg.com')"></script>

  <script>
    if (typeof React === 'undefined') { showErr('React did not load — CDN unreachable?'); }
    else if (typeof Babel === 'undefined') { showErr('Babel did not load — CDN unreachable?'); }
    else {
      fetch('/app.jsx')
        .then(function(r) { return r.text(); })
        .then(function(src) {
          try {
            var out = Babel.transform(src, { presets: ['react'], filename: 'app.jsx' });
            // Use indirect eval to run in global scope
            (0, eval)(out.code);
          } catch(e) {
            showErr(String(e) + '\n' + (e.stack || ''));
          }
        })
        .catch(function(e) {
          showErr('Failed to fetch app.jsx: ' + String(e));
        });
    }
  </script>

  <script>
    window.__korechatReady = function() {
      var s = document.getElementById('splash');
      if (s) { s.style.opacity = '0'; setTimeout(function(){ s.remove(); }, 350); }
    };
    setTimeout(window.__korechatReady, 5000);

    // Register service worker for PWA
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(function(){});
    }
  </script>
</body>
</html>
