<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="kg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7eb8f7"/>
      <stop offset="100%" stop-color="#7ef7d0"/>
    </linearGradient>
    <radialGradient id="bg-glow" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#1a3050"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </radialGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="100" height="100" rx="22" fill="url(#bg-glow)"/>
  <!-- Subtle top-edge highlight -->
  <rect x="0" y="0" width="100" height="1" rx="1" fill="#ffffff08"/>
  <!-- Bold K lettermark -->
  <text x="51" y="68"
    text-anchor="middle"
    font-family="'Arial Black', 'Arial Bold', 'Helvetica Neue', sans-serif"
    font-weight="900"
    font-size="58"
    fill="url(#kg)">K</text>
</svg>
