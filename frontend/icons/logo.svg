<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 60">
  <defs>
    <linearGradient id="kg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7eb8f7"/>
      <stop offset="100%" stop-color="#7ef7d0"/>
    </linearGradient>
    <radialGradient id="bg-glow" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#1a3050"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </radialGradient>
  </defs>

  <!-- Icon mark (48x48, vertically centered) -->
  <rect x="0" y="6" width="48" height="48" rx="11" fill="url(#bg-glow)"/>
  <text x="24" y="42"
    text-anchor="middle"
    font-family="'Arial Black', 'Arial Bold', 'Helvetica Neue', sans-serif"
    font-weight="900"
    font-size="28"
    fill="url(#kg)">K</text>

  <!-- Wordmark: "Kore" in gradient + "Chat" in muted blue -->
  <text x="62" y="38"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-weight="800"
    font-size="26"
    letter-spacing="-0.5">
    <tspan fill="url(#kg)">Kore</tspan><tspan fill="#c8d8f0">Chat</tspan>
  </text>
</svg>
