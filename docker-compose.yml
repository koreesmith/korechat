version: "3.9"

services:

  # ── Postgres ─────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: korechat-postgres
    restart: unless-stopped
    user: "500:500"
    env_file:
      - .env
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - korechat
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U korechat"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Go API + WebSocket backend ────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: korechat-backend
    restart: unless-stopped
    expose:
      - "8080"
    env_file:
      - .env
    volumes:
      - ./data/avatars:/data/avatars
      - ./data/uploads:/data/uploads
      - ./data/snippets:/data/snippets
    networks:
      - korechat
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8080 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── nginx frontend + reverse proxy ───────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: korechat-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - korechat
    depends_on:
      backend:
        condition: service_healthy

networks:
  korechat:
    driver: bridge
